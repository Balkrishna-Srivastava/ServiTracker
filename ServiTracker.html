<!DOCTYPE html>
<html lang="hi">
<head>
  <title>ServiTrack – Service Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f5f6fa;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 18px 20px;
      text-align: center;
    }
    .header h1 {
      color: #fff;
      font-size: 22px;
      letter-spacing: 1px;
    }
    .header p {
      color: #a0aec0;
      font-size: 12px;
      margin-top: 3px;
    }

    .container {
      max-width: 480px;
      margin: 20px auto;
      padding: 0 16px;
    }

    .category-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .tab {
      padding: 8px 14px;
      border-radius: 20px;
      border: 2px solid #e2e8f0;
      background: white;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      color: #718096;
      transition: all 0.2s;
    }
    .tab.active {
      border-color: #e63946;
      background: #e63946;
      color: white;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .category-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fff5f5;
      color: #e63946;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 5px;
      margin-top: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      color: #2d3748;
      background: #f8fafc;
      transition: border 0.2s;
      appearance: none;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #e63946;
      background: white;
    }

    .select-wrap {
      position: relative;
    }
    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #718096;
      pointer-events: none;
    }

    .status-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 6px;
    }
    .status-btn {
      padding: 10px 6px;
      border-radius: 10px;
      border: 2px solid #e2e8f0;
      background: white;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      color: #718096;
      transition: all 0.2s;
    }
    .status-btn.selected {
      border-color: #e63946;
      background: #fff5f5;
      color: #e63946;
      font-weight: 700;
    }
    .status-btn .icon { font-size: 18px; display: block; margin-bottom: 3px; }

    .submit-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #e63946, #c1121f);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      margin-top: 20px;
      cursor: pointer;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 15px rgba(230,57,70,0.3);
    }

    .entries-section {
      margin-top: 24px;
    }
    .entries-title {
      font-size: 14px;
      font-weight: 700;
      color: #4a5568;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .entry-card {
      background: white;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .entry-info { flex: 1; }
    .entry-name { font-weight: 700; font-size: 14px; color: #2d3748; }
    .entry-detail { font-size: 12px; color: #718096; margin-top: 2px; }
    .entry-category { font-size: 11px; color: #e63946; font-weight: 600; margin-top: 2px; }
    .entry-status {
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    .status-received { background: #ebf8ff; color: #2b6cb0; }
    .status-inprogress { background: #fef3c7; color: #92400e; }
    .status-ready { background: #f0fff4; color: #276749; }

    .update-btn {
      background: none;
      border: 1.5px solid #e63946;
      color: #e63946;
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 11px;
      cursor: pointer;
      margin-left: 8px;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #2d3748;
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
      z-index: 999;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>⚙️ ServiTrack</h1>
  <p>Service Status Tracker — WhatsApp Notification</p>
</div>

<div class="container">

  <!-- Category Tabs -->
  <div class="category-tabs">
    <button class="tab active" onclick="setCategory('bike', this)">🏍️ Bike</button>
    <button class="tab" onclick="setCategory('mobile', this)">📱 Mobile</button>
    <button class="tab" onclick="setCategory('electronic', this)">💻 Electronic</button>
    <button class="tab" onclick="setCategory('other', this)">🔧 Other</button>
  </div>

  <!-- Form Card -->
  <div class="card">
    <div class="category-badge" id="categoryBadge">🏍️ Bike Repair</div>

    <label>Customer Name</label>
    <input type="text" id="custName" placeholder="e.g. Ramesh Kumar">

    <label>Phone Number</label>
    <input type="tel" id="custPhone" placeholder="e.g. 9876543210">

    <label id="itemLabel">Bike Number / Model</label>
    <input type="text" id="itemDetail" placeholder="e.g. UP32 AB 1234">

    <label>Problem / Kaam</label>
    <input type="text" id="problem" placeholder="e.g. Oil change, Screen repair">

    <label>Status</label>
    <div class="status-row">
      <div class="status-btn selected" onclick="setStatus('Received', this)">
        <span class="icon">📥</span>Received
      </div>
      <div class="status-btn" onclick="setStatus('In Progress', this)">
        <span class="icon">🔧</span>In Progress
      </div>
      <div class="status-btn" onclick="setStatus('Ready', this)">
        <span class="icon">✅</span>Ready
      </div>
    </div>

    <button class="submit-btn" onclick="submitEntry()">📲 Send WhatsApp & Save</button>
  </div>

  <!-- Entries List -->
  <div class="entries-section">
    <div class="entries-title">📋 Today's Entries <span id="entryCount" style="background:#e63946;color:white;padding:2px 8px;border-radius:10px;font-size:11px;">0</span></div>
    <div id="entriesList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let currentCategory = 'bike';
  let currentStatus = 'Received';
  let entries = JSON.parse(localStorage.getItem('servitrack_entries') || '[]');

  const categoryConfig = {
    bike:       { badge: '🏍️ Bike Repair',       label: 'Bike Number / Model',    placeholder: 'e.g. UP32 AB 1234' },
    mobile:     { badge: '📱 Mobile Repair',      label: 'Mobile Model',           placeholder: 'e.g. Samsung A52' },
    electronic: { badge: '💻 Electronic Repair',  label: 'Device Name / Model',    placeholder: 'e.g. Dell Laptop, LG TV' },
    other:      { badge: '🔧 Other Service',      label: 'Item / Description',     placeholder: 'e.g. AC, Fridge, Watch' }
  };

  const statusMessages = {
    'Received':    (name, item, cat) => `Namaste ${name}! ✅ Aapka ${cat} *${item}* humne receive kar liya hai. Kaam shuru hone par update karenge. - ServiTrack`,
    'In Progress': (name, item, cat) => `Namaste ${name}! 🔧 Aapke ${cat} *${item}* ka kaam chal raha hai. Thodi der mein ready hoga! - ServiTrack`,
    'Ready':       (name, item, cat) => `Namaste ${name}! 🎉 Aapka ${cat} *${item}* bilkul READY hai! Aap aa sakte hain. - ServiTrack`
  };

  function setCategory(cat, el) {
    currentCategory = cat;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    const cfg = categoryConfig[cat];
    document.getElementById('categoryBadge').textContent = cfg.badge;
    document.getElementById('itemLabel').textContent = cfg.label;
    document.getElementById('itemDetail').placeholder = cfg.placeholder;
  }

  function setStatus(status, el) {
    currentStatus = status;
    document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
  }

  function submitEntry() {
    const name  = document.getElementById('custName').value.trim();
    const phone = document.getElementById('custPhone').value.trim();
    const item  = document.getElementById('itemDetail').value.trim();
    const prob  = document.getElementById('problem').value.trim();

    if (!name || !phone || !item) {
      showToast('⚠️ Name, Phone aur Item zaroori hai!');
      return;
    }

    const phoneClean = phone.replace(/\D/g, '').slice(-10);
    const catName = currentCategory.charAt(0).toUpperCase() + currentCategory.slice(1);
    const message = statusMessages[currentStatus](name, item, catName);
    const url = `https://wa.me/91${phoneClean}?text=${encodeURIComponent(message)}`;
    window.open(url);

    // Save entry
    const entry = {
      id: Date.now(),
      name, phone: phoneClean, item, problem: prob,
      category: currentCategory,
      status: currentStatus,
      time: new Date().toLocaleTimeString('hi-IN', {hour:'2-digit', minute:'2-digit'})
    };
    entries.unshift(entry);
    localStorage.setItem('servitrack_entries', JSON.stringify(entries));

    renderEntries();
    showToast('✅ Entry save ho gayi!');

    // Clear form
    document.getElementById('custName').value = '';
    document.getElementById('custPhone').value = '';
    document.getElementById('itemDetail').value = '';
    document.getElementById('problem').value = '';
  }

  function updateStatus(id) {
    const entry = entries.find(e => e.id === id);
    if (!entry) return;
    const statuses = ['Received', 'In Progress', 'Ready'];
    const next = statuses[(statuses.indexOf(entry.status) + 1) % statuses.length];
    entry.status = next;
    localStorage.setItem('servitrack_entries', JSON.stringify(entries));

    const phoneClean = entry.phone;
    const catName = entry.category.charAt(0).toUpperCase() + entry.category.slice(1);
    const message = statusMessages[next](entry.name, entry.item, catName);
    const url = `https://wa.me/91${phoneClean}?text=${encodeURIComponent(message)}`;
    window.open(url);

    renderEntries();
    showToast(`📲 Status updated: ${next}`);
  }

  function renderEntries() {
    const list = document.getElementById('entriesList');
    document.getElementById('entryCount').textContent = entries.length;
    if (entries.length === 0) {
      list.innerHTML = '<p style="text-align:center;color:#a0aec0;font-size:13px;padding:20px;">Koi entry nahi abhi</p>';
      return;
    }
    list.innerHTML = entries.map(e => {
      const statusClass = e.status === 'Received' ? 'status-received' : e.status === 'In Progress' ? 'status-inprogress' : 'status-ready';
      const catEmoji = {bike:'🏍️', mobile:'📱', electronic:'💻', other:'🔧'}[e.category];
      return `
        <div class="entry-card">
          <div class="entry-info">
            <div class="entry-name">${e.name}</div>
            <div class="entry-detail">📞 ${e.phone} · ${e.time}</div>
            <div class="entry-category">${catEmoji} ${e.item} ${e.problem ? '· '+e.problem : ''}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
            <span class="entry-status ${statusClass}">${e.status}</span>
            <button class="update-btn" onclick="updateStatus(${e.id})">Update ▶</button>
          </div>
        </div>`;
    }).join('');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
  }

  renderEntries();
</script>
</body>
</html>
